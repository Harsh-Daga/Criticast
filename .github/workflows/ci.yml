name: CI

on:
  push:
    branches: [main, phase1/shippable-core]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.22.x"

      - name: Install BPF toolchain
        run: sudo ./scripts/ci-install-deps.sh

      - name: Verify
        run: ./scripts/verify.sh
