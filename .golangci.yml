run:
  timeout: 5m
  tests: true
  go: "1.22"

linters:
  enable:
    - errcheck
    - gosimple
    - govet
    - ineffassign
    - staticcheck
    - unused
    - misspell
    - unconvert

linters-settings:
  staticcheck:
    checks: ["all", "-ST1000", "-ST1020"] # exclude package comment requirements

issues:
  exclude-rules:
    - path: _test\.go
      linters: [errcheck]
